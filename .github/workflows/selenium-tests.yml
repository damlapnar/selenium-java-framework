name: Selenium Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 7 * * 1-5'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chrome, firefox]

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run Selenium tests
        run: mvn test -Dbrowser=${{ matrix.browser }} -q
        continue-on-error: false

      - name: Write step summary
        if: always()
        run: |
          echo "## Selenium Results — ${{ matrix.browser }}" >> $GITHUB_STEP_SUMMARY
          if [ -d target/surefire-reports ]; then
            PASS=$(grep -r 'tests="' target/surefire-reports/*.xml 2>/dev/null |               python3 -c "import sys,re; nums=[int(m) for l in sys.stdin for m in re.findall(r'tests=.(\d+)', l)]; print(sum(nums))" || echo "?")
            FAIL=$(grep -r 'failures="' target/surefire-reports/*.xml 2>/dev/null |               python3 -c "import sys,re; nums=[int(m) for l in sys.stdin for m in re.findall(r'failures=.(\d+)', l)]; print(sum(nums))" || echo "?")
            echo "| ✅ Passed | $PASS |" >> $GITHUB_STEP_SUMMARY
            echo "| ❌ Failed | $FAIL |" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload Surefire reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: surefire-${{ matrix.browser }}
          path: target/surefire-reports/
          retention-days: 30

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots-${{ matrix.browser }}
          path: target/screenshots/
          if-no-files-found: ignore
          retention-days: 7
